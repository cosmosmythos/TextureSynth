[pytest]
# Pin pytest's cache to inside tests/python/ so the repo root stays clean
# (no .pytest_cache/ at the top level). pytest computes rootdir from the
# location of this file, so we don't need to set it explicitly.
cache_dir = tests/python/.pytest_cache
addopts = -ra
markers =
    timeout: pytest-timeout marker (set per-test via @pytest.mark.timeout(N))
